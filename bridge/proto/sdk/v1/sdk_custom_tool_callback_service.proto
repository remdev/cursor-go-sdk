syntax = "proto3";

package sdk.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/remdev/cursor-go-sdk/bridge/gen/go/sdk/v1;sdkv1";

// Custom-tool callbacks from the Node bridge to a host process (e.g. Go).
//
// The bridge forwards in-process SDK custom-tool executions to the host over
// `CallCustomTool`, mirroring `@cursor/sdk` `local.customTools` execute
// callbacks. Tool metadata crosses CreateAgent/Send options; only execution
// round-trips to the host.
service SdkCustomToolCallbackService {
  rpc CallCustomTool(CallCustomToolRequest) returns (CallCustomToolResponse);
}

message CallCustomToolRequest {
  string tool_name = 1;
  google.protobuf.Struct args = 2;
  optional string tool_call_id = 3;
  // Agent that owns the tool definition (CreateAgent / ResumeAgent local.custom_tools).
  string agent_id = 4;
}

message CallCustomToolResponse {
  // SDKCustomToolResult wire shape (string, object, or content envelope).
  google.protobuf.Struct result = 1;
}
