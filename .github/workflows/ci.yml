name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install bridge
        working-directory: bridge
        run: npm ci

      - name: Add bridge to PATH
        run: echo "$GITHUB_WORKSPACE/bridge/bin" >> "$GITHUB_PATH"

      - name: Go vet
        run: |
          go vet ./...
          go vet ./examples/...

      - name: Test root module
        run: go test -race -count=1 ./...

      - name: Test TUI example
        working-directory: examples/coding-agent-tui
        run: go test -race -count=1 ./...

      - name: Build examples
        run: |
          go build -o /dev/null ./examples/basic
          go build -o /dev/null ./examples/quickstart
          go build -o /dev/null ./examples/coding-agent-cli

      - name: Build TUI example
        working-directory: examples/coding-agent-tui
        run: go build -o /dev/null .
